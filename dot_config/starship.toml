format = """
[╭─](bold cyan)\
$os\
$username\
[](fg:#a3aed2 bg:#769ff0)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_metrics\
[](fg:#394260 bg:#212736)\
$package\
$nodejs\
$python\
$rust\
$golang\
$java\
$kotlin\
$lua\
$php\
$ruby\
$swift\
$terraform\
$docker_context\
$kubernetes\
$helm\
[](fg:#212736 bg:#16161e)\
$aws\
$gcloud\
$azure\
[](fg:#16161e bg:#0f0f14)\
$memory_usage\
$cmd_duration\
$jobs\
$time\
[](fg:#0f0f14)\
$line_break\
[╰─](bold cyan)$character"""

[os]
format = "[$symbol](bg:#a3aed2 fg:#090c0c)"
disabled = false

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "bg:#a3aed2 fg:#090c0c"
style_root = "bg:#a3aed2 fg:#ff6b6b"
format = '[ $user ]($style)'

[hostname]
ssh_only = false
style = "bg:#394260 fg:#769ff0"
format = '[ $hostname ]($style)'

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
home_symbol = " ~"
fish_style_pwd_dir_length = 1

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = " "
"Desktop" = "󰇄 "
"Code" = " "
"src" = " "
"bin" = " "
".config" = " "
"node_modules" = " "
".git" = " "
"projects" = " "
"dev" = " "
"www" = "󰞉 "

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'
truncation_length = 20

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
deleted = ""
modified = ""
renamed = "󰁕"
staged = ""
stashed = ""
untracked = "?"

[git_metrics]
added_style = "fg:#769ff0 bg:#394260"
deleted_style = "fg:#769ff0 bg:#394260"
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '
disabled = false

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = "🐍"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "🦀"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

