[aws]
symbol = ""
style = "bg:#0f0f14"
format = '[[ $symbol ($profile) ](fg:#769ff0 bg:#0f0f14)]($style)'

[gcloud]
symbol = "󱇶"
style = "bg:#0f0f14"
format = '[[ $symbol ($project) ](fg:#769ff0 bg:#0f0f14)]($style)'

[azure]
symbol = "󰠅"
style = "bg:#0f0f14"
format = '[[ $symbol ($subscription) ](fg:#769ff0 bg:#0f0f14)]($style)'
disabled = false

[time]
disabled = false
time_format = "%R"
style = "bg:#0f0f14"
format = '[[  $time ](fg:#a0a9cb bg:#0f0f14)]($style)'

[cmd_duration]
min_time = 2_000
style = "bg:#0f0f14"
format = '[[ 󰔛 $duration ](fg:#a0a9cb bg:#0f0f14)]($style)'

[jobs]
symbol = ""
style = "bg:#0f0f14"
format = '[[ $symbol $number ](fg:#a0a9cb bg:#0f0f14)]($style)'

[battery]
full_symbol = ""
charging_symbol = ""
discharging_symbol = ""
style = "bg:#0f0f14"
format = '[[ $symbol $percentage ](fg:#a0a9cb bg:#0f0f14)]($style)'

[[battery.display]]
threshold = 10
style = "bg:#ff6b6b"

[[battery.display]]
threshold = 30
style = "bg:#ffb86c"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold blue)"

[package]
symbol = "󰏗"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'
disabled = false

[memory_usage]
disabled = false
threshold = 75
symbol = "󰍛"
style = "bg:#0f0f14"
format = '[[ $symbol ${ram_pct} ](fg:#a0a9cb bg:#0f0f14)]($style)'

# Additional useful modules for development
[env_var.VIRTUAL_ENV]
variable = "VIRTUAL_ENV"
format = '[[ $env_value ](fg:#769ff0 bg:#212736)]($style)'
style = "bg:#212736"

[nix_shell]
disabled = false
impure_msg = '[impure shell](bold red)'
pure_msg = '[pure shell](bold green)'
format = '[[ via $state( \($name\)) ](fg:#769ff0 bg:#212736)]($style)'
style = "bg:#212736"

